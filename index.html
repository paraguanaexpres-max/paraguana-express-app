<!DOCTYPE html>
<html>
<head>
  <title>Paraguana Express Tracking</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 40px;">
  <img src="logo-paraguana.png.jpeg" style="width:150px; margin-bottom:20px;" />

  <h1>Paraguana Express</h1>
  <p>Consulta tu paquete</p>

  <input id="tracking" placeholder="Ej: PX-26001" style="padding:10px; width:200px;" />
  <button onclick="buscar()">Buscar</button>

  <p id="resultado"></p>

  <script>
    async function buscar() {
   const code = document.getElementById('tracking').value.toUpperCase();
      const res = await fetch("https://kiixujxrpogovchxxmry.supabase.co/rest/v1/public_tracking?tracking_code=eq." + code, {
        headers: {
          "apikey": "sb_publishable_dy9JAB4CLLut7v8ffxcQ0Q_zzL0AtNC",
          "Authorization": "Bearer sb_publishable_dy9JAB4CLLut7v8ffxcQ0Q_zzL0AtNC"
        }
      });

      const data = await res.json();

      if (data.length === 0) {
        document.getElementById('resultado').innerText = "No encontrado";
      } else {
        const estado = data[0].current_status;
let color = "#3b82f6"; // azul por defecto

const estadoLower = estado.toLowerCase();

if (estadoLower.includes("entregado")) {
  color = "#22c55e"; // verde
} else if (estadoLower.includes("transito") || estadoLower.includes("tránsito")) {
  color = "#eab308"; // amarillo
} else if (estadoLower.includes("recibido")) {
  color = "#3b82f6"; // azul
} else if (estadoLower.includes("aduana")) {
  color = "#a855f7"; // morado (extra pro)
} else if (estadoLower.includes("reparto")) {
  color = "#f97316"; // naranja
} else if (estadoLower.includes("problema")) {
  color = "#ef4444"; // rojo
}

document.getElementById('resultado').innerHTML = `
  <div style="
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background:#f9fafb;
    border:1px solid #e5e7eb;
  ">
    <strong>Código:</strong> ${data[0].tracking_code}<br/>
    <strong>Estado:</strong> 
    <span style="
      background:${color};
      color:white;
      padding:5px 10px;
      border-radius:999px;
      font-weight:bold;
      margin-left:5px;
    ">
      ${estado}
    </span>
  </div>
`;
 }
 }
