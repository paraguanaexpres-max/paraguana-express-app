<!DOCTYPE html>
<html>
<head>
  <title>Paraguana Express Tracking</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 40px; background:#0B1D3A; color:#D4AF37;">
  <img src="logo-paraguana.png.jpeg" style="width:150px; margin-bottom:20px;" />

  <h1 style="color:#0F172A;">Paraguana Express</h1>
  <p>Consulta tu paquete</p>

  <input id="tracking" placeholder="Ej: PX-260414" style="padding:10px; width:220px; border-radius:8px; border:1px solid #ccc;" />
  <button onclick="buscar()" style="padding:10px 18px; border:none; border-radius:8px; background:#0F172A; color:white; cursor:pointer;">Buscar</button>

  <div id="resultado" style="margin-top:20px;"></div>

  <script>
    function barraProgreso(estado) {
      const pasos = [
        { key: "recibido", label: "Recibido" },
        { key: "transito", label: "Tránsito" },
        { key: "aduana", label: "Aduana" },
        { key: "reparto", label: "Reparto" },
        { key: "entregado", label: "Entregado" }
      ];

      let pasoActual = 0;

      if (estado.includes("entregado")) {
        pasoActual = 4;
      } else if (estado.includes("reparto")) {
        pasoActual = 3;
      } else if (estado.includes("aduana")) {
        pasoActual = 2;
      } else if (estado.includes("transito") || estado.includes("tránsito")) {
        pasoActual = 1;
      } else {
        pasoActual = 0;
      }

      let html = '<div style="margin-top:20px; display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap;">';

      pasos.forEach((paso, i) => {
        const activo = i <= pasoActual;
        const color = activo ? "#22c55e" : "#d1d5db";

        html += `
          <div style="flex:1; min-width:70px; text-align:center;">
            <div style="
              width:22px;
              height:22px;
              border-radius:50%;
              background:${color};
              margin:0 auto 6px;
            "></div>
            <div style="font-size:12px; color:#111827;">${paso.label}</div>
          </div>
        `;
      });

      html += '</div>';
      return html;
    }

    async function buscar() {
      const code = document.getElementById('tracking').value.trim().toUpperCase();
      const resultado = document.getElementById('resultado');

      if (!code) {
        resultado.innerHTML = '<div style="color:red;">Ingresa un código</div>';
        return;
      }

      const res = await fetch("https://kiixujxrpogovchxxmry.supabase.co/rest/v1/public_tracking?tracking_code=eq." + code, {
        headers: {
          "apikey": "sb_publishable_dy9JAB4CLLut7v8ffxcQ0Q_zzL0AtNC",
          "Authorization": "Bearer sb_publishable_dy9JAB4CLLut7v8ffxcQ0Q_zzL0AtNC"
        }
      });

      const data = await res.json();

      if (data.length === 0) {
        resultado.innerHTML = '<div style="color:red;">No encontrado</div>';
      } else {
        const estado = data[0].current_status;
        const estadoLower = estado.toLowerCase();
        let color = "#3b82f6";

        if (estadoLower.includes("entregado")) {
          color = "#22c55e";
        } else if (estadoLower.includes("transito") || estadoLower.includes("tránsito")) {
          color = "#eab308";
        } else if (estadoLower.includes("recibido")) {
          color = "#22c55e"; // verde
        } else if (estadoLower.includes("aduana")) {
          color = "#a855f7";
        } else if (estadoLower.includes("reparto")) {
          color = "#f97316";
        } else if (estadoLower.includes("problema")) {
          color = "#ef4444";
        }

        resultado.innerHTML = `
          <div style="
            margin:20px auto 0;
            padding:20px;
            border-radius:12px;
            background:#ffffff;
            border:1px solid #e5e7eb;
            max-width:520px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
          ">
            <div><strong>Código:</strong> ${data[0].tracking_code}</div>
            <div style="margin-top:12px;">
              <strong>Estado:</strong>
              <span style="
                background:${color};
                color:white;
                padding:6px 12px;
                border-radius:999px;
                font-weight:bold;
                margin-left:6px;
                display:inline-block;
              ">
                ${estado}
              </span>
            </div>
            ${barraProgreso(estadoLower)}
          </div>
        `;
      }
    }
  </script>
</body>
</html>
